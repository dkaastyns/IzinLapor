; PHP configuration untuk Vercel serverless runtime
; File ini dibaca otomatis oleh vercel-php

; Ukuran upload maksimal (sesuai validasi controller: max 1MB per foto × 3 foto)
upload_max_filesize = 8M
post_max_size = 10M

; Batas memori (cukup untuk Cloudinary upload)
memory_limit = 256M

; Batas waktu eksekusi (max Vercel = 30 detik)
max_execution_time = 30
max_input_time = 30

; Error reporting (sembunyikan di production)
display_errors = Off
log_errors = On

; Timezone Indonesia
date.timezone = Asia/Jakarta

; Extension yang diperlukan Laravel
extension = pdo_pgsql
extension = pgsql
extension = gd
extension = mbstring
extension = openssl
extension = tokenizer
extension = xml
extension = json
extension = bcmath
extension = ctype
extension = fileinfo
extension = curl
